	<div class="flex flex-row ml-2" id="tabs">

		<div class="px-4 hover:border-(--color-plaintext) border-(--color-background-one) border-b-2" id="canvas-tab">

		<div class="px-4 hover:border-(--color-plaintext) border-(--color-background-one) border-b-2" id="about-tab">
			About
		</div>

	<div class="flex-row mr-4 hidden xl:flex" id="status">
		<div class="px-7"><span class="text-(--color-primarygreen)">/ </span><span id="storage">51</span>%</div>
		<div class="px-7"><span class="text-(--color-primarygreen)">RAM </span><span id="ram">56</span>%</div>
		<div class="px-7"><span class="text-(--color-primarygreen)">CPU </span><span id="cpu">27</span>%</div>
		<div class="px-7"><span class="text-(--color-primarygreen)">eth0 </span><span id="eth">192.168.48.137</span></div>
		<div class="pl-7"><span class="text-(--color-primarygreen)"><span id="time">19:53</span></span></div>
	</div>
</div>
<script defer>
	var mainTab = document.getElementById("main-tab");
	var canvasTab = document.getElementById("canvas-tab");
	var aboutTab = document.getElementById("about-tab");

	var storageEl = document.getElementById("storage");
	var ramEl = document.getElementById("ram");
	var cpuEl = document.getElementById("cpu");
	var ethEl = document.getElementById("eth");
	var timeEl = document.getElementById("time");

	var currentLocation = window.location.pathname;
	var tabSelectedStyle = "border-(--color-primarygreen)";
	var tabHoveredStyle = "hover:border-(--color-plaintext)"
	
	// Handle navigation
	mainTab.onclick = () => { window.location = "/" };
	canvasTab.onclick = () => { window.location = "/canvas" };
	aboutTab.onclick = () => { window.location = "/about" };

	// Handle current tab highlight
	switch (currentLocation.split("/")[1]) {
		case "":
			mainTab.classList.add(tabSelectedStyle);
			mainTab.classList.remove(tabHoveredStyle);
			break;
		case "canvas":
			canvasTab.classList.add(tabSelectedStyle);
			canvasTab.classList.remove(tabHoveredStyle);
			break;
		case "about":
			aboutTab.classList.add(tabSelectedStyle);
			aboutTab.classList.remove(tabHoveredStyle);
			break;
	}

	// Handle stat updates
	var storage = 51;
	var ram = 56;
	var cpu = 27;

	var options = {
		hour: "numeric",
		minute: "numeric",
		hour12: false
	}

	var time = new Intl.DateTimeFormat(undefined, options).format(new Date);
	timeEl.textContent = time;
	setInterval(() => {
		time = new Intl.DateTimeFormat(undefined, options).format(new Date);
		timeEl.textContent = time;
		var shouldUpdate = Math.round(Math.random()) == 1;
		if (shouldUpdate) {
			ramEl.textContent = Math.min(100, Number(ramEl.textContent) + Math.round(Math.random())*Math.round(Math.random()*5) * (Math.round(Math.random()) ? -1 : 1));
			cpuEl.textContent = Math.min(100, Number(cpuEl.textContent) + Math.round(Math.random())*Math.round(Math.random()*5) * (Math.round(Math.random()) ? -1 : 1));
		}
	}, 2000)

</script>

	<style>
		/**
		 * Gruvbox dark theme
		 *
		 * Adapted from a theme based on:
		 * Vim Gruvbox dark Theme (https://github.com/morhetz/gruvbox)

		 * @author Azat S. <to@azat.io>

		code[class*="language-"],
		pre[class*="language-"] {
			color: #ebdbb2; /* fg1 / fg */
			font-family: Consolas, Monaco, "Andale Mono", monospace;
			direction: ltr;
			text-align: left;
			white-space: pre;
			word-spacing: normal;
			word-break: normal;

			-moz-tab-size: 4;
			-o-tab-size: 4;
			tab-size: 4;

			-webkit-hyphens: none;
			-moz-hyphens: none;
			-ms-hyphens: none;
			hyphens: none;
		}

		pre[class*="language-"]::-moz-selection,
		pre[class*="language-"] ::-moz-selection,
		code[class*="language-"]::-moz-selection,
		code[class*="language-"] ::-moz-selection {
			color: #fbf1c7; /* fg0 */
			background: #7c6f64; /* bg4 */
		}

		pre[class*="language-"]::selection,
		pre[class*="language-"] ::selection,
		code[class*="language-"]::selection,
		code[class*="language-"] ::selection {
			color: #fbf1c7; /* fg0 */
			background: #7c6f64; /* bg4 */
		}

		/* Code blocks */
		pre[class*="language-"] {
			padding: 1em;
			margin: 0.5em 0;
			overflow: auto;
		}
		
		/* APENDER: add wrap */
		code[class*="language-"] {
			@media (width > 40rem) {
				text-wrap-mode: wrap;
				overflow-wrap: anywhere;
			}
		}

		:not(pre) > code[class*="language-"],
		pre[class*="language-"] {
			background: #191B1C; /* bg0_h */
			border: 1px solid #665C54;
		}

		/* Inline code */
		:not(pre) > code[class*="language-"] {
			padding: 0.1em;
			border-radius: 0.3em;
		}

		.token.comment,
		.token.prolog,
		.token.cdata {
			color: #a89984; /* fg4 / gray1 */
		}

		.token.delimiter,
		.token.boolean,
		.token.keyword,
		.token.selector,
		.token.important,
		.token.atrule {
			color: #fb4934; /* red2 */
		}

		.token.operator,
		.token.punctuation,
		.token.attr-name {
			color: #a89984; /* fg4 / gray1 */
		}

		.token.tag,
		.token.tag .punctuation,
		.token.doctype,
		.token.builtin {
			color: #fabd2f; /* yellow2 */
		}

		.token.entity,
		.token.number,
		.token.symbol {
			color: #d3869b; /* purple2 */
		}

		.token.property,
		.token.constant,
		.token.variable {
			color: #fb4934; /* red2 */
		}

		.token.string,
		.token.char {
			color: #b8bb26; /* green2 */
		}

		.token.attr-value,
		.token.attr-value .punctuation {
			color: #a89984; /* fg4 / gray1 */
		}

		.token.url {
			color: #b8bb26; /* green2 */
		}

		.token.function {
			color: #fabd2f; /* yellow2 */
		}

		.token.regex {
			background: oklch(0.8591 0 126.59 / 15.94%); /* green2 */
		}

		.token.bold {
			font-weight: bold;
		}

		.token.italic {

		}

		.token.inserted {
			background: #a89984; /* fg4 / gray1 */
		}

		.token.deleted {

		}
